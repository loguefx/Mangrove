name: Release

# Tag a commit (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build the Android APK and a
# self-contained Windows server build, then publish them both to a GitHub Release.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install required SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Build debug APK
        working-directory: apps/android
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Rename APK
        run: cp apps/android/app/build/outputs/apk/debug/app-debug.apk "mangrove-${RELEASE_TAG}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: mangrove-*.apk
          if-no-files-found: error

  server:
    name: Build Windows server
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build web UI
        working-directory: apps/web
        run: |
          npm ci
          npm run build

      - name: Bundle web UI into server (wwwroot)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path apps/server/wwwroot | Out-Null
          Copy-Item -Path apps/web/dist/* -Destination apps/server/wwwroot -Recurse -Force

      - name: Publish (win-x64, self-contained)
        run: dotnet publish apps/server/Mangrove.Server.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -o publish

      - name: Zip server build
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath "mangrove-server-${env:RELEASE_TAG}-win-x64.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: server-win-x64
          path: mangrove-server-*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [android, server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Mangrove ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            artifacts/**/*.apk
            artifacts/**/*.zip
